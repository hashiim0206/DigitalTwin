# calibration_bayesopt.yaml
# Defines the search space for Optuna Bayesian Optimization

optimizer:
  n_trials: 50
  timeout: 3600  # 1 hour max

parameters:
  accel:
    type: float
    low: 1.0
    high: 4.0
    default: 3.0
  decel:
    type: float
    low: 1.0
    high: 6.0
    default: 4.5
  sigma:
    type: float
    low: 0.1
    high: 1.0
    default: 0.5
  minGap:
    type: float
    low: 1.0
    high: 5.0
    default: 2.5
  tau:
    type: float
    low: 0.5
    high: 2.5
    default: 1.0
